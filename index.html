<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MySmooth</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1e1e1e;
      --surface: #2d2d30;
      --panel: #252a31;
      --border: #3f3f46;
      --text: #e0e0e0;
      --muted: #b0b0b0;
      --blue: #3275c2;
      --blue-hover: #5992d4;
      --warn: #dfa44a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      max-width: 70ch;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    label {
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
    }

    select {
      min-height: 32px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 8px 14px;
      border-radius: 3px;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      background: var(--blue);
    }

    a.button.secondary {
      background: #3e3e42;
    }

    a.button:hover { background: var(--blue-hover); }
    a.button.secondary:hover { background: #505055; }

    section {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px;
    }

    .panel h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .notice {
      background: #2f2a22;
      border: 1px solid #8a6a2a;
      color: var(--warn);
    }

    .download-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 18px;
    }

    .download-panel h2 {
      margin-top: 0;
    }

    .download-panel p {
      margin-bottom: 0;
    }

    a.button.primary-large {
      min-height: 44px;
      min-width: 190px;
      padding: 11px 18px;
      font-size: 15px;
    }

    .source-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
      padding: 0;
      list-style: none;
    }

    .source-list li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px;
      color: var(--muted);
    }

    .source-list a {
      color: var(--text);
      font-weight: 700;
    }

    footer {
      padding-top: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    footer a { color: var(--text); }

    @media (max-width: 720px) {
      header {
        display: block;
      }

      .topbar {
        margin-top: 18px;
      }

      .download-panel {
        display: block;
      }

      a.button.primary-large {
        width: 100%;
        margin-top: 16px;
      }
    }
  </style>
</head>

    <header>

    <section>

        </div>
        <div class="panel">
          <h3 data-i18n="poeTitle"></h3>
          <p data-i18n="poeBody"></p>
        </div>
        <div class="panel">
          <h3 data-i18n="remoteTitle"></h3>
          <p data-i18n="remoteBody"></p>
        </div>
      </div>
    </section>

    <section>
      <h2 data-i18n="supportTitle"></h2>
      <p data-i18n="supportBody"></p>
    </section>

    <section>
      <h2 data-i18n="importantTitle"></h2>
      <p data-i18n="importantBody"></p>
      <h3 data-i18n="sourceTitle"></h3>
      <ul class="source-list">
        <li><a href="https://www.pathofexile.com/legal/terms-of-use-and-privacy-policy">Grinding Gear Games Terms of Use</a><br><span data-i18n="sourceGgg"></span></li>

      </ul>
    </section>

    <footer>
      <p><span data-i18n="manifest"></span> <a href="./manifest.json">manifest.json</a></p>
    </footer>
  </main>

    const select = document.getElementById("language");
    const fallback = "pt-BR";

    function normalizeLanguage(language) {
      const value = (language || "").toLowerCase();
      if (value.startsWith("pt")) return "pt-BR";
      if (value.startsWith("fr")) return "fr";
      if (value.startsWith("es")) return "es";
      if (value.startsWith("ru")) return "ru";
      if (value.startsWith("ko")) return "ko";
      if (value.startsWith("ja")) return "ja";
      if (value.startsWith("zh")) return "zh-CN";
      if (value.startsWith("en")) return "en";
      return fallback;
    }

    function applyLanguage(language) {
      const key = translations[language] ? language : fallback;
      const strings = translations[key];
      document.documentElement.lang = key;
      select.value = key;
      localStorage.setItem("mysmooth-language", key);
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = strings[node.dataset.i18n] || "";
      });
    }

    const saved = localStorage.getItem("mysmooth-language");
    applyLanguage(saved || normalizeLanguage(navigator.language));
    select.addEventListener("change", () => applyLanguage(select.value));
  </script>
